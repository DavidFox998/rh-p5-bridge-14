name: Lean CI (P5-Bridge-14)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: "lake build (Mathlib v4.12.0)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- -y --default-toolchain leanprover/lean4:v4.12.0
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean toolchain
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-v4.12.0-${{ hashFiles('lean-toolchain') }}
          restore-keys: elan-${{ runner.os }}-v4.12.0-

      - name: lake update
        run: lake update

      - name: Get Mathlib olean cache
        run: lake exe cache get || true

      - name: lake build
        run: lake build

      - name: Check zero sorry
        run: |
          FOUND=$(grep -rn --include='*.lean' '\bsorry\b' \
                  Towers/RH/Chain/ 2>/dev/null \
                  | grep -v '\-\-.*sorry' \
                  | grep -v 'NOT a sorry\|not a sorry\|[Nn]o.*sorry\|0 sorry\|sorry = 0\|SORRY: 0\|zero sorry' \
                  | grep -v 'sorry-free\|no raw.*sorry\|without sorry' \
                  | grep -v '`sorry`\|NOT sorry\|NO sorry\|0-sorry' || true)
          if [ -n "$FOUND" ]; then
            echo "FAIL: sorry found in proof code:"
            echo "$FOUND"
            exit 1
          fi
          echo "PASS: no sorry in proof code"

      - name: Axiom audit C10 main theorem
        run: |
          cat > /tmp/p5_audit.lean << 'LEANEOF'
import Towers.RH.Chain.C10_MainTheorem
#print axioms TheoremaAureum.M_zeros_of_zeta_controlled_by_X0_143
LEANEOF
          lake env lean /tmp/p5_audit.lean
